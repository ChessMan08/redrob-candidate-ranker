# ============================================================================
# AI tools declaration
# ============================================================================
# Transparency only — declared use is NOT penalized. Be honest. Stage 5 interview
# may verify these declarations against your code; declarations that contradict
# your code or your interview are flagged.
ai_tools_used:
  - "Claude"        # e.g. for architecture discussion, code review
  # Other options: "ChatGPT", "Cursor", "Gemini", "Codeium", "Other", "None"

ai_usage_summary: |
  - Used Claude for end-to-end architecture design discussion, few code generation (show_top100, check_honeypots), and debugging 
  of the ranking pipeline (feature scorers, honeypot detection, TF-IDF re-ranking, evaluation metrics, and the Streamlit sandbox). 
  
  - Claude was also used to review output quality (top-10 sanity checks, score-gap analysis) and iterate on scoring
  weights based on real run results. 
  
  - No candidate data was sent to any external LLM API during actual ranking. The deployed rank.py pipeline is fully
  deterministic and makes zero network or API calls at inference time.
  

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  
  "Deterministic, multi-signal ranking engine. Six weighted scoring components -
  career trajectory (35%), skills credibility (30%), experience fit (13%),
  behavioral availability (12%), location (6%), education (4%) - combined into
  a composite score per candidate. Career trajectory is the decisive signal
  against IT-services and non-ML-title false positives; skills only count if
  backed by real usage (duration + endorsements + Redrob assessment score),
  defeating keyword-stuffer traps. Multiplicative adjustments apply a graded
  honeypot penalty (0.2-1.0) for inconsistent profiles, a behavioral hard-gate
  for extreme unavailability, and a small GitHub-activity tiebreaker. Top-500
  candidates are re-ranked via TF-IDF cosine similarity against a JD-intent
  representation (75% structured / 25% TF-IDF blend) to separate near-tied
  top scorers. Reasoning strings are template-generated directly from each
  candidate's own cleaned fields - zero LLM calls, zero hallucination risk.
  Runtime: ~40 seconds for 100,000 candidates on 8-core CPU, well under the
  5-minute budget."

